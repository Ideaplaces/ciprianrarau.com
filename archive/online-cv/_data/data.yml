career-profile:
    title: Career Profile
    summary: |
      I am a passionate technologist, systems architect, and entrepreneur with over 25 years of experience delivering scalable, high-quality software solutions. My expertise spans across client and server development, infrastructure, databases, DevOps, AI integration, and marketing automation, making me a well-rounded and adaptable professional.

      **Highlights:**
        - **Built businesses from scratch**, scaling platforms to multimillion-dollar ARR.
        - **Designed and implemented complex systems** with terabytes of data and hundreds of millions of rows.
        - **Expert in technology and business optimization**, bridging development, product, sales, and marketing.
        - **Hands-on experience in coding across the stack**, from Swift and Kotlin to Python, TypeScript, Ruby on Rails, and Terraform.
        - **Specialized in scalability**, optimization, performance, and automation, ensuring speed and resilience.
        - **Led marketing and sales tech implementations**, including email automations, reporting tools, and optimized workflows.
        - **Capable of cleaning up codebases and processes** to help businesses scale efficiently.

      **Technology Expertise:**
        - **Client Development**: Swift (iOS & macOS), Kotlin (Android), React.js, Vue.js, Angular, HTML/CSS/JavaScript, React Native, Ionic, Flutter (cross-platform), Webflow, Wix, WordPress, Astro.
        - **Server Development**: Node.js, PHP, Python (Django, Flask), Java, Kotlin (server-side), TypeScript (backend services), Ruby, Ruby on Rails, Laravel, GraphQL, REST APIs.
        - **Infrastructure & DevOps**: Google Cloud Platform (GCP), AWS, Terraform, Ansible, Docker, Kubernetes, Jenkins, Cloudflare, CI/CD pipelines (GitLab, GitHub Actions).
        - **Databases**: PostgreSQL, MySQL, MongoDB, BigQuery, Redis, Elasticsearch.
        - **AI & Data Analytics**: OpenAI GPT API, LangChain, Google Cloud AI, Cloud Vision, Data pipelines, ETL processes, Superset, Tableau, Looker, SuperSort.
        - **Code Quality**: Unit testing, integration testing, BDD, TDD, Cypress, Jest, Mocha.
        - **Scalability & Optimization**: Microservices, log management, speed optimization, performance tuning.
        - **Sales & Marketing Tools**: HubSpot, Mailchimp, Klaviyo, SendGrid, Zapier, CRM integration, Google Analytics, SEO tools, email automations.

      With experience in every stage of the business lifecycle—from product ideation to scaling teams—I bring a chameleon-like ability to adapt and craft innovative solutions that drive business success.

