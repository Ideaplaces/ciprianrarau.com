name: Deploy website to production

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy
    environment: production
    runs-on: ubuntu-latest
    concurrency:
      group: aws-production
      cancel-in-progress: true
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: act10ns/slack@v2
        with:
          status: starting
        if: always()

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mentorly-website
          NEXT_PUBLIC_API_URL: https://api.mentorly.com
          NEXT_PUBLIC_BASE_URL: https://mentorly.com
          NEXT_PUBLIC_COOKIE_DOMAIN: mentorly.com
          NEXT_PUBLIC_TOKEN_NAME: token
          IMAGE_TAG: ${{ github.sha }}
        run: |
          doppler run -- docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg=NEXT_PUBLIC_API_URL \
            --build-arg=NEXT_PUBLIC_BASE_URL \
            --build-arg=NEXT_PUBLIC_COOKIE_DOMAIN \
            --build-arg=NEXT_PUBLIC_TOKEN_NAME \
            --build-arg=NEXT_PUBLIC_GA_MEASUREMENT_ID \
            --build-arg=NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID \
            --build-arg=NEXT_PUBLIC_STRIPE_PK \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: production-task-definition.json
          container-name: mentorly-website
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: website-production
          cluster: api
          wait-for-service-stability: false
          wait-for-minutes: 2

      - name: Parse Jira Keys from Commit
        id: jira_keys
        uses: HighwayThree/jira-extract-issue-keys@master
        with:
          is-pull-request: ${{ github.event_name == 'pull_request' }}
          parse-all-commits: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm Jira Key Values
        if: always()
        run: |
          echo "Jira Keys: ${{steps.jira_keys.outputs.jira-keys}}"

      - name: Push Deployment Info to Jira
        if: steps.jira_keys.outputs.jira-keys != ''
        id: push_deployment_info_to_jira
        uses: HighwayThree/jira-upload-deployment-info@master
        with:
          client-id: '${{ secrets.JIRA_CLIENT_ID }}'
          client-secret: '${{ secrets.JIRA_CLIENT_SECRET }}'
          cloud-instance-base-url: 'https://mentorly.atlassian.net/'
          issue-keys: '${{ steps.jira_keys.outputs.jira-keys }}'
          display-name: 'Deployment number ${{ github.sha }}'
          description: 'Production Deployment'
          last-updated: '${{github.event.head_commit.timestamp}}'
          label: 'Production Deployment Label'
          state: 'successful'
          environment-id: 'Production'
          environment-display-name: 'Production'
          environment-type: 'production'

      - uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: always()
